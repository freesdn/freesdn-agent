name: Agent Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. v1.0.0)'
        required: true

env:
  # 3.12 matches the resolver target of requirements-release.txt: that lock is
  # a single-Python universal-across-platforms resolution and omits
  # backports.tarfile (a jaraco-context dep required only on python < 3.12), so
  # --require-hashes only succeeds on 3.12+. The shipped binaries bundle their
  # own interpreter; source installs (>=3.11) resolve deps without hash-pinning.
  PYTHON_VERSION: '3.12'

jobs:
  # ==========================================================================
  # Build agent binaries on 3 platforms x 2 types
  # ==========================================================================
  build:
    name: Build ${{ matrix.type }} - ${{ matrix.os }}
    # This is the agent's OWN release pipeline; it ships (flattened, root-layout)
    # into freesdn/freesdn-agent and runs there. The file also lives in the dev
    # monorepo (where the agent is under agent/ and the tag scheme differs), so
    # guard against it misfiring on a monorepo v* tag. All downstream jobs need
    # `build`, so a skip here cascades to the whole workflow.
    if: github.repository == 'freesdn/freesdn-agent'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
        type: [daemon, desktop]
        exclude:
          # Desktop app not supported on macOS yet (PySide6 arm64 issues)
          - os: macos-latest
            type: desktop

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      # install from the hash-pinned release manifest so that
      # every package pulled at build time is reproducible and supply-chain safe.
      # requirements-release.txt is a universal (win/mac/linux) lock generated by
      # `uv pip compile --universal --generate-hashes`: every package, including
      # transitive deps and the PyInstaller build toolchain, is pinned to an exact
      # version + sha256. `--require-hashes` below makes pip verify each downloaded
      # wheel/sdist against those hashes and refuse anything unpinned or altered.
      # Regenerate the lock before bumping any dependency (see the file header).
      - name: Install dependencies (daemon)
        if: matrix.type == 'daemon'
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-release.txt

      - name: Install dependencies (desktop)
        if: matrix.type == 'desktop'
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-release.txt

      # NOTE: Npcap is NOT installed here. It is a RUNTIME dependency — scapy
      # loads wpcap.dll on the end user's Windows host for raw-socket L2/L3
      # discovery (ARP/LLDP/CDP). PyInstaller does not (and may not, for
      # licensing) bundle wpcap.dll, so installing Npcap on the build runner
      # produces no change in the artifact; its silent installer also hangs
      # headless CI. Windows users install Npcap themselves (documented in the
      # release notes / agent README).
      - name: Build with PyInstaller
        working-directory: .
        shell: bash
        run: pyinstaller packaging/${{ matrix.type }}.spec --clean --noconfirm

      - name: Generate checksums
        working-directory: ./dist
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            BINARY="freesdn-agent.exe"
            [ "${{ matrix.type }}" = "desktop" ] && BINARY="freesdn-agent-gui.exe"
          else
            BINARY="freesdn-agent"
            [ "${{ matrix.type }}" = "desktop" ] && BINARY="freesdn-agent-gui"
          fi
          sha256sum "$BINARY" > "$BINARY.sha256"
          echo "binary=$BINARY" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.type }}-${{ runner.os }}-${{ steps.version.outputs.version }}
          path: |
            dist/freesdn-agent*
          retention-days: 7

  # ==========================================================================
  # Build platform installers
  # ==========================================================================
  package:
    name: Package installers
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/

      - name: Build DEB package
        run: |
          chmod +x packaging/installers/build_deb.sh
          bash packaging/installers/build_deb.sh \
            "${{ steps.version.outputs.version }}" \
            "artifacts/daemon-Linux-${{ steps.version.outputs.version }}/freesdn-agent"
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Upload DEB
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installer-deb-${{ steps.version.outputs.version }}
          path: "*.deb"

  # ==========================================================================
  # SBOM generation
  # ==========================================================================
  #
  # One SBOM per release, generated from the agent source tree
  # (pyproject.toml + uv.lock / requirements). The Python dependency
  # set is identical across the three OS targets - only the PyInstaller
  # bundling differs - so per-binary SBOMs would just duplicate this
  # one. We attach the SPDX-JSON document to the GitHub release so
  # downstream consumers (and enterprise procurement) can audit
  # transitive deps without re-deriving them.
  sbom:
    name: SBOM (SPDX-JSON)
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM with syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: "freesdn-agent-${{ steps.version.outputs.version }}.spdx.json"
          # Don't upload to release here - the release job collates all
          # artifacts in one place. Keep this job's only job to produce
          # the SBOM as a workflow artifact.
          upload-release-assets: false
          upload-artifact: true
          artifact-name: "sbom-${{ steps.version.outputs.version }}"

  # ==========================================================================
  # Create GitHub Release
  # ==========================================================================
  release:
    name: Create Release
    needs: [build, package, sbom]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Flatten artifacts into release directory with platform prefixes
          for dir in artifacts/*/; do
            dirname=$(basename "$dir")
            for f in "$dir"*; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              # Prefix with platform info from artifact name. SBOM and
              # .deb artifacts pass through unmodified - they're already
              # platform-tagged (or platform-independent) in their name.
              case "$dirname" in
                *Linux*)   prefix="linux-amd64" ;;
                *Windows*) prefix="win64" ;;
                *macOS*)   prefix="macos" ;;
                *deb*)     prefix="" ;;
                sbom-*)    prefix="" ;;
                *)         prefix="" ;;
              esac
              if [ -n "$prefix" ]; then
                cp "$f" "release/${prefix}-${fname}"
              else
                cp "$f" "release/${fname}"
              fi
            done
          done
          ls -la release/

      - name: Generate release checksums
        working-directory: release
        run: sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: FreeSDN Agent v${{ steps.version.outputs.version }}
          body: |
            ## FreeSDN Agent v${{ steps.version.outputs.version }}

            ### Downloads

            | Platform | Daemon Agent | Desktop App |
            |----------|-------------|-------------|
            | **Windows x64** | `win64-freesdn-agent.exe` | `win64-freesdn-agent-gui.exe` |
            | **Linux amd64** | `linux-amd64-freesdn-agent` | `linux-amd64-freesdn-agent-gui` |
            | **macOS** | `macos-freesdn-agent` | - |
            | **Debian/Ubuntu** | `freesdn-agent_${{ steps.version.outputs.version }}_amd64.deb` | - |

            ### Quick Start

            ```bash
            # Linux
            sudo dpkg -i freesdn-agent_${{ steps.version.outputs.version }}_amd64.deb
            sudo freesdn-agent register --server https://your-freesdn.com
            sudo systemctl enable --now freesdn-agent

            # Windows (run as Administrator)
            freesdn-agent.exe register --server https://your-freesdn.com
            freesdn-agent.exe daemon
            ```

            ### Verification

            All binaries include SHA-256 checksums. Verify with:
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            ### Software Bill of Materials

            `freesdn-agent-${{ steps.version.outputs.version }}.spdx.json`
            contains the SPDX 2.x SBOM for the Python dependency tree
            used to build this release. Generated by syft.
          files: release/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}

  # ==========================================================================
  # Push release metadata to FreeSDN backend (optional)
  # ==========================================================================
  #
  # Posts the real per-binary checksum + size from the artifacts to the
  # backend's POST /api/v1/agents/downloads/releases endpoint so that
  # /downloads/page and the agent's /updates/check return correct data.
  # The agent's UpdaterService aborts on any checksum mismatch, so a
  # placeholder zero hash here would make every auto-update fail.
  publish-metadata:
    name: Publish to FreeSDN
    needs: release
    runs-on: ubuntu-22.04
    if: ${{ vars.FREESDN_SERVER_URL != '' }}

    steps:
      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: Flatten artifacts (mirror release job)
        id: assemble
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            dirname=$(basename "$dir")
            for f in "$dir"*; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              case "$dirname" in
                *Linux*)   prefix="linux-amd64" ;;
                *Windows*) prefix="win64" ;;
                *macOS*)   prefix="macos" ;;
                *)         prefix="" ;;
              esac
              if [ -n "$prefix" ]; then
                cp "$f" "release/${prefix}-${fname}"
              else
                cp "$f" "release/${fname}"
              fi
            done
          done
          ls -la release/

      - name: Publish release metadata
        env:
          SERVER_URL: ${{ vars.FREESDN_SERVER_URL }}
          API_TOKEN: ${{ secrets.FREESDN_API_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${API_TOKEN}" ]; then
            echo "::error::FREESDN_API_TOKEN secret is not set"
            exit 1
          fi

          # filename pattern per (platform, agent_type) in the release/ dir
          # (matches the prepare-release-assets step above).
          declare -A FILE_MAP=(
            ["windows/daemon"]="win64-freesdn-agent.exe"
            ["windows/desktop"]="win64-freesdn-agent-gui.exe"
            ["linux/daemon"]="linux-amd64-freesdn-agent"
            ["linux/desktop"]="linux-amd64-freesdn-agent-gui"
            ["macos/daemon"]="macos-freesdn-agent"
          )

          base_url="https://github.com/${REPO}/releases/download/v${VERSION}"
          failures=0

          for key in "${!FILE_MAP[@]}"; do
            platform="${key%/*}"
            agent_type="${key#*/}"
            fname="${FILE_MAP[$key]}"
            path="release/${fname}"

            if [ ! -f "$path" ]; then
              echo "::warning::missing artifact for ${platform}/${agent_type} (expected $path) - skipping"
              continue
            fi

            sha=$(sha256sum "$path" | cut -d' ' -f1)
            size=$(stat -c%s "$path")
            url="${base_url}/${fname}"

            payload=$(jq -nc \
              --arg v   "${VERSION}" \
              --arg p   "${platform}" \
              --arg t   "${agent_type}" \
              --arg u   "${url}" \
              --arg sha "${sha}" \
              --argjson sz "${size}" \
              '{
                version: $v,
                platform: $p,
                agent_type: $t,
                download_url: $u,
                checksum_sha256: $sha,
                file_size: $sz,
                release_notes: ("Agent v" + $v),
                is_prerelease: (($v | contains("-")))
              }')

            echo "→ ${platform}/${agent_type}: ${url} (${size} bytes, sha=${sha:0:12}…)"
            if ! curl -fS -X POST "${SERVER_URL}/api/v1/agents/downloads/releases" \
                  -H "Authorization: Bearer ${API_TOKEN}" \
                  -H "Content-Type: application/json" \
                  --data "${payload}"; then
              echo "::error::Publish failed for ${platform}/${agent_type}"
              failures=$((failures + 1))
            fi
            echo
          done

          if [ "${failures}" -gt 0 ]; then
            echo "::error::${failures} publish(es) failed"
            exit 1
          fi
